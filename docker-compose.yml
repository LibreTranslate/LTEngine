services:
  ltengine:
    image: ghcr.io/libretranslate/ltengine:main
    container_name: ltengine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - models:/models
    environment:
      HF_HOME: /models
      LTENGINE_MODEL: gemma3-4b  # gemma3-1b | gemma3-4b | gemma3-12b | gemma3-27b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  models:
