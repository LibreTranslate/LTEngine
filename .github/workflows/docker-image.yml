name: Build Docker images & artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [ "": "", "vulkan": "vulkan", "cuda": "cuda" ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (optional multi-arch)
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (handle cuda separately)
        run: |
          if [ "${{ matrix.features }}" = "cuda" ]; then
            docker build \
              --build-arg BASE_IMAGE=nvidia/cuda:12.4.1-devel-ubuntu22.04 \
              --build-arg RUNTIME_BASE=nvidia/cuda:12.4.1-runtime-ubuntu22.04 \
              --build-arg FEATURES="cuda" \
              -t ltengine:cuda .
          else
            if [ -z "${{ matrix.features }}" ]; then
              docker build -t ltengine:cpu .
            else
              docker build --build-arg FEATURES="${{ matrix.features }}" -t "ltengine:${{ matrix.features }}" .
            fi
          fi

  build-macos-metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain-action@stable
      - name: Build macOS release (Metal)
        run: |
          cargo build --release --manifest-path ltengine/Cargo.toml --features metal
      - name: Upload macOS binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ltengine-macos-metal
          path: ltengine/target/release/ltengine